name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip 'setuptools>=83'
      - run: >-
          python -m pip install torch==2.13.0 torchvision==0.28.0
          --index-url https://download.pytorch.org/whl/cpu
      - run: python -m pip install -e '.[dev,web]'
      - run: python -m pip check
      - run: python -m pip_audit
      - run: python scripts/audit_consistency.py --project-root .
      - run: python -m pytest -q
      - run: ruff check .
      - run: ruff format --check .
      - run: python -m compileall -q src scripts tests

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build:vercel

  container-contract:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          target: runtime-base
          push: false
          tags: terraclass-api:contract-test
          cache-from: type=gha
          cache-to: type=gha,mode=max
